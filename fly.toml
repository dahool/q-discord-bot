# fly.toml app configuration file generated for cashapp on 2023-06-29T14:09:18-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "qapp"
primary_region = "lax"
kill_signal = "SIGINT"
kill_timeout = "10s"

[env]
  CALENDAR_URL = "https://qapp.fly.dev/calendar"
  CALLBACK_URL = "https://qapp.fly.dev/oauth/redirect"
  DASHBOARD_URL = "https://qapp.fly.dev/"
  LOGGING_DB = "discord_logging"
  LOGGING_MES = "PROD"
  NAME = "QBOT"
  NODE_ENV = "production"
  PORT = "3000"
  TZ = "UTC"
  ZONE = "America/Argentina/Buenos_Aires"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "2s"
    grace_period = "15s"
    restart_limit = 0
