<div class="list-group" style="margin-top: 60px;" *ngIf="servers">
    <h3 class="text-center">Select Server</h3>
    <ng-container *ngFor="let server of servers">
    <li (click)="navigateTo(server)" class="list-group-item list-group-item-action">
      <div class="d-flex w-100 justify-content-between align-items-center">
        <h5 class="mb-1">{{server.name}}</h5>
        <img src="{{server.icon}}" width="128px" height="128px">
      </div>
    </li>
    </ng-container>
</div>
