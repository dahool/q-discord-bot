<ng-template #content let-modal>

    <form #form="ngForm" (ngSubmit)="saveEvent(form)">

        <div class="modal-header">
            <h4 class="modal-title">Add Event</h4>
            <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss()"></button>
        </div>
        <div class="modal-body">
            
                <div class="form-group">
                    <label for="zone" class="form-label">Territory</label>
                    <ng-select name="zone" [items]="zones"
                                [multiple]="false"
                                bindValue="zone"
                                bindLabel="zone"
                                [(ngModel)]="event.zone"
                                (change)="modelUpdate($event)"
                                required>
                    </ng-select>
                </div>
                
                <ng-container *ngIf="event.zone">

                    <div class="form-group">
                        <label for="next" class="form-label">Next Schedule</label>
                        <input name="next" class="form-control" type="text" [value]="diplayEventDate()" readonly/>
                        <div class="d-flex justify-content-center">
                            <div class="btn-group" role="group">
                                <button [disabled]="step == 0" (click)="step=step-1" type="button" class="btn btn-secondary"><i class="fa-solid fa-backward"></i></button>
                                <button [disabled]="step == 0" type="button" (click)="step=0" class="btn btn-secondary"><i class="fa-solid fa-rotate-left"></i></button>
                                <button type="button" (click)="step=step+1" class="btn btn-secondary"><i class="fa-solid fa-forward"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="title" class="form-label">Summary</label>
                        <input name="title" class="form-control" type="text" [(ngModel)]="event.title" required/>
                    </div>

                    <div class="form-group">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="recurrent" name="recurrent" [(ngModel)]="event.recurrent"/>
                            <label class="form-check-label" for="recurrent">Recurrent</label>
                        </div>
                        <div class="form-text" *ngIf="event.recurrent">Every {{weekday}}</div>
                    </div>

                    <div class="form-group">
                        <label for="ping" class="form-label">Ping Roles</label>
                        <ng-select
                            name="ping"
                            [items]="roles"
                            [multiple]="true"
                            [closeOnSelect]="false"
                            bindValue="id"
                            bindLabel="name"
                            [(ngModel)]="event.ping">
                            <ng-template ng-option-tmp let-item="item" let-item$="item$" let-index="index">
                                <input id="role-{{ index }}" type="checkbox" [value]="item$.selected" /> {{ item.name }}
                            </ng-template>
                        </ng-select>
                    </div>
                </ng-container>
        </div>
        <div class="modal-footer justify-content-between">
            <button type="button" class="btn btn-secondary" (click)="modal.close()">Close</button>
            <button type="button" class="btn btn-danger" *ngIf="editable" (click)="removeEvent()">Delete</button>
            <button type="submit" class="btn btn-primary">Save</button>
        </div>

    </form>
</ng-template>
