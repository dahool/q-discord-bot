 <ng-select
    [items]="channelList"
    [multiple]="isMultiple"
    bindLabel="name"
    groupBy="parent"
    [selectableGroup]="false"
    [selectableGroupAsModel]="false"
    [closeOnSelect]="!isMultiple"
    bindValue="id"
    (change)="onValueUpdate($event)"
    #inputField>

    <ng-template ng-option-tmp let-item="item" let-item$="item$" let-index="index">
        <input id="item-{{formControlName}}-{{ index }}" type="checkbox" [ngModel]="item$.selected" /> {{ item.name }}
    </ng-template>

</ng-select>
